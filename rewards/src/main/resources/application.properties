spring.application.name = rewards
server.port = 8081

spring.output.ansi.enabled = ALWAYS

spring.datasource.url = jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username = ${DB_USER}
spring.datasource.password = ${DB_PASSWORD}

springdoc.swagger-ui.enabled = true
springdoc.swagger-ui.path = /docs
springdoc.api-docs.enabled = true
springdoc.api-docs.path = /openapi.json
springdoc.use-bean-validation = true

spring.rabbitmq.addresses = amqp://${RABBIT_HOST}:${RABBIT_PORT}/
spring.rabbitmq.username = ${RABBIT_USER}
spring.rabbitmq.password = ${RABBIT_PASSWORD}

logging.level.org.jooq.Constants = off

rabbit.queue-name = ${RABBIT_QUEUE_NAME}

app.cashback.factor = 0.05
app.points.multiplier = 20
